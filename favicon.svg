<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo-500 -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- Purple-500 -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink-500 -->
    </linearGradient>
  </defs>
  
  <!-- Background Shape (Rounded Square) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#logo_gradient)" />
  
  <!-- LM Text -->
  <text 
    x="50%" 
    y="50%" 
    dy=".35em" 
    text-anchor="middle" 
    font-family="Arial, sans-serif" 
    font-weight="900" 
    font-size="280" 
    fill="white"
    letter-spacing="-10"
  >
    LM
  </text>
</svg>